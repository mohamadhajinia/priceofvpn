<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VPN</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Vazirmatn';
  direction: rtl;
  background: radial-gradient(circle at top,#020617,#0f172a);
  color:white;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  padding:20px;
}

.logo { color:#22d3ee; }

/* HERO */
.hero {
  text-align:center;
  margin-top:40px;
}

.hero h1 {
  font-size:40px;
  background:linear-gradient(90deg,#22d3ee,#a855f7);
  -webkit-background-clip:text;
  color:transparent;
}

/* SUPPORT BOX */
.support {
  text-align:center;
  margin-top:20px;
}

.support a {
  color:#22d3ee;
  text-decoration:none;
  border:1px solid #22d3ee;
  padding:8px 15px;
  border-radius:10px;
}

/* GRID */
.container {
  max-width:1100px;
  margin:40px auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:10px;
}

.card {
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.1);
  transition:0.3s;
}

.card:hover {
  transform:translateY(-10px);
  box-shadow:0 0 20px rgba(34,211,238,0.4);
}

.price {
  color:#22d3ee;
  font-size:26px;
}

.btn {
  display:block;
  margin-top:10px;
  padding:10px;
  text-align:center;
  border-radius:10px;
  background:linear-gradient(45deg,#6366f1,#a855f7);
  color:white;
  text-decoration:none;
}

/* DISCOUNT */
.discount {
  text-align:center;
  margin-top:20px;
}

.copy-btn {
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#22d3ee;
  cursor:pointer;
}

/* footer */
.footer {
  text-align:center;
  margin:40px;
  opacity:0.6;
}

.footer a {
  color:#22d3ee;
  text-decoration:none;
}
</style>

</head>

<body>

<nav>
  <div class="logo">VPN SHOP</div>
</nav>

<section class="hero">
  <h1>خرید VPN</h1>
  <p>اکانت 30 روزه | سرعت بالا</p>
</section>

<!-- 🔥 پشتیبانی -->
<div class="support">
  <p>پشتیبانی:</p>
  <a href="https://t.me/ajabbaradar" target="_blank">
    ارتباط با پشتیبانی
  </a>
</div>

<!-- 💣 کد تخفیف -->
<div class="discount">
  <p>کد تخفیف:</p>
  <button class="copy-btn" onclick="copyCode()">کپی کد aramnet</button>
</div>

<div class="container" id="list"></div>

<div class="footer">
  ساخته شده توسط 
  <a href="https://t.me/aramnetorg" target="_blank">آرام نت</a>
</div>

<script>

let telegramLink = "https://t.me/aramnetbot";

/* ساخت پلن‌ها */
let products = [];

for(let i=5;i<=30;i+=5){
  products.push({
    name: i + " گیگ",
    price: i * 12000
  });
}

function render(){
  let list = document.getElementById("list");
  list.innerHTML = "";

  products.forEach(p=>{
    list.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <div class="price">${p.price.toLocaleString()} تومان</div>
        <p>30 روزه - پرسرعت</p>
        <a class="btn" href="${telegramLink}" target="_blank">
          خرید
        </a>
      </div>
    `;
  });
}

/* کپی کد تخفیف */
function copyCode(){
  navigator.clipboard.writeText("aramnet");
  alert("کد کپی شد 😎");
}

render();

</script>

</body>
</html>
